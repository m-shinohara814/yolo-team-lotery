<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOLO ドッジボール チームくじ</title>

<style>
body {
    font-family: sans-serif;
    text-align: center;
    padding: 12px;
    background: #f7f7f7;
}

.header {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 12px;
    margin-bottom: 6px;
}

.header img {
    width: 108px;
    height: 108px;
    object-fit: contain;
}

.header-title {
    text-align: left;
    font-size: 30px;
    font-weight: bold;
    line-height: 1.25;
}

button,
select {
    font-size: 18px;
    padding: 10px 14px;
    margin: 6px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

button small {
    font-size: 14px;
}

.guide-text {
    font-size: 18px;
    font-weight: bold;
    margin-top: 22px;
    margin-bottom: 10px;
    white-space: nowrap;
}

.guide-text span {
    font-size: 14px;
    font-weight: normal;
}

.button-area {
    display: flex;
    justify-content: center;
    gap: 4px;
    width: 100%;
}

.button-area button {
    flex: 1;
    margin: 0;
    padding: 10px 2px;
    font-size: 16px;
    font-weight: bold;
}

.button-area button small {
    font-size: 13px;
    font-weight: bold;
}

.male {
    background: #6aa9ff;
    color: black;
}

.strong-male {
    background: #2f7df6;
    color: black;
}

.female {
    background: #ff8fc7;
    color: black;
}

.strong-female {
    background: #ff4fa3;
    color: black;
}

#result {
    font-size: 64px;
    font-weight: bold;
    margin: 0;
    min-height: 80px;
}

.team-red {
    color: red;
}

.team-blue {
    color: blue;
}

.team-orange {
    color: orange;
}

.team-pink {
    color: deeppink;
}

.team-white {
    color: black;
}

.team-green {
    color: green;
}

table {
    width: 100%;
    max-width: 420px;
    margin: 10px auto;
    border-collapse: collapse;
    background: white;
    font-size: 16px;
}

th,
td {
    border: 1px solid #ccc;
    padding: 8px 4px;
}
</style>
</head>

<body>

<div class="header">
    <img src="yolo-logo.png" alt="YOLO">

    <div class="header-title">
        ドッジボール<br>
        チームくじ
    </div>
</div>

<label for="teamCount">チーム数：</label>

<select id="teamCount" onchange="resetTeams()">
    <option value="2">2チーム</option>
    <option value="3">3チーム</option>
    <option value="4">4チーム</option>
    <option value="5">5チーム</option>
    <option value="6" selected>6チーム</option>
</select>

<p class="guide-text">
    いずれかのボタンを押してください<br>
    <span>Tap one of the buttons</span>
</p>

<div class="button-area">
    <button class="male" onclick="draw('male')">
        男子<br>
        <small>Men</small>
    </button>

    <button class="strong-male" onclick="draw('strongMale')">
        強い男子<br>
        <small>Skilled Men</small>
    </button>

    <button class="female" onclick="draw('female')">
        女子<br>
        <small>Women</small>
    </button>

    <button class="strong-female" onclick="draw('strongFemale')">
        強い女子<br>
        <small>Skilled Women</small>
    </button>
</div>

<div id="result">？</div>

<table>
    <thead>
        <tr>
            <th>チーム</th>
            <th>男子</th>
            <th>強男</th>
            <th>女子</th>
            <th>強女</th>
            <th>合計</th>
        </tr>
    </thead>

    <tbody id="teamTable"></tbody>
</table>

<script>
const STORAGE_KEY = "yoloDodgeballLotteryDataV2";

const allTeams = [
    "RED",
    "BLUE",
    "ORANGE",
    "PINK",
    "WHITE",
    "GREEN"
];

let counts = {};
let isDrawing = false;

function getTeams() {
    const teamCount = Number(
        document.getElementById("teamCount").value
    );

    return allTeams.slice(0, teamCount);
}

function getTeamClass(team) {
    return "team-" + team.toLowerCase();
}

function createEmptyTeamCount() {
    return {
        male: 0,
        strongMale: 0,
        female: 0,
        strongFemale: 0
    };
}

function createInitialCounts(teams) {
    const initialCounts = {};

    teams.forEach(team => {
        initialCounts[team] = createEmptyTeamCount();
    });

    return initialCounts;
}

function saveData() {
    const result = document.getElementById("result");

    const data = {
        teamCount: document.getElementById("teamCount").value,
        counts: counts,
        resultText: result.textContent,
        resultClass: result.className
    };

    localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(data)
    );
}

function loadData() {
    const saved = localStorage.getItem(STORAGE_KEY);

    if (!saved) {
        resetTeams(false);
        return;
    }

    try {
        const data = JSON.parse(saved);

        document.getElementById("teamCount").value =
            data.teamCount || "6";

        const teams = getTeams();

        counts = data.counts || createInitialCounts(teams);

        teams.forEach(team => {
            if (!counts[team]) {
                counts[team] = createEmptyTeamCount();
            }
        });

        const result = document.getElementById("result");

        result.textContent = data.resultText || "？";
        result.className = data.resultClass || "";

        renderTable();

    } catch (error) {
        resetTeams(false);
    }
}

function resetTeams(shouldSave = true) {
    if (isDrawing) {
        return;
    }

    const teams = getTeams();

    counts = createInitialCounts(teams);

    const result = document.getElementById("result");

    result.textContent = "？";
    result.className = "";

    renderTable();

    if (shouldSave) {
        saveData();
    }
}

function getTotal(team) {
    return (
        counts[team].male +
        counts[team].strongMale +
        counts[team].female +
        counts[team].strongFemale
    );
}

function getGenderTotal(team, type) {
    const isMale =
        type === "male" ||
        type === "strongMale";

    if (isMale) {
        return (
            counts[team].male +
            counts[team].strongMale
        );
    }

    return (
        counts[team].female +
        counts[team].strongFemale
    );
}

function findBestTeam(type) {
    const teams = getTeams();

    return teams
        .slice()
        .sort((teamA, teamB) => {
            /*
             * 優先順位1：
             * チーム合計人数が少ないチーム
             */
            const totalDifference =
                getTotal(teamA) - getTotal(teamB);

            if (totalDifference !== 0) {
                return totalDifference;
            }

            /*
             * 優先順位2：
             * 今回押された分類が少ないチーム
             */
            const categoryDifference =
                counts[teamA][type] -
                counts[teamB][type];

            if (categoryDifference !== 0) {
                return categoryDifference;
            }

            /*
             * 優先順位3：
             * 同じ性別の合計が少ないチーム
             */
            const genderDifference =
                getGenderTotal(teamA, type) -
                getGenderTotal(teamB, type);

            if (genderDifference !== 0) {
                return genderDifference;
            }

            /*
             * すべて同じ場合は固定順で決定
             */
            return (
                allTeams.indexOf(teamA) -
                allTeams.indexOf(teamB)
            );
        })[0];
}

function setButtonsDisabled(disabled) {
    const buttons =
        document.querySelectorAll(".button-area button");

    buttons.forEach(button => {
        button.disabled = disabled;
    });
}

function draw(type) {
    if (isDrawing) {
        return;
    }

    isDrawing = true;
    setButtonsDisabled(true);

    const teams = getTeams();
    const result = document.getElementById("result");

    let animationCount = 0;

    const animation = setInterval(() => {
        const randomTeam =
            teams[
                Math.floor(Math.random() * teams.length)
            ];

        result.textContent = randomTeam;
        result.className = getTeamClass(randomTeam);

        animationCount++;

        if (animationCount >= 30) {
            clearInterval(animation);

            const selectedTeam = findBestTeam(type);

            counts[selectedTeam][type]++;

            result.textContent = selectedTeam;
            result.className =
                getTeamClass(selectedTeam);

            renderTable();
            saveData();

            isDrawing = false;
            setButtonsDisabled(false);
        }
    }, 80);
}

function renderTable() {
    const teams = getTeams();

    const displayOrder = [
        "ORANGE",
        "BLUE",
        "PINK",
        "RED",
        "WHITE",
        "GREEN"
    ];

    const displayTeams =
        displayOrder.filter(team =>
            teams.includes(team)
        );

    const tbody =
        document.getElementById("teamTable");

    tbody.innerHTML = displayTeams
        .map(team => {
            const total = getTotal(team);

            return `
                <tr>
                    <td class="${getTeamClass(team)}">
                        <strong>${team}</strong>
                    </td>

                    <td>${counts[team].male}</td>
                    <td>${counts[team].strongMale}</td>
                    <td>${counts[team].female}</td>
                    <td>${counts[team].strongFemale}</td>
                    <td>${total}</td>
                </tr>
            `;
        })
        .join("");
}

loadData();
</script>

</body>
</html>
