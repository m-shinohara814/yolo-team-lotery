<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOLO ドッジボール チームくじ</title>

<style>
body {
    font-family: sans-serif;
    text-align: center;
    padding: 20px;
    background: #f7f7f7;
}

h1 {
    margin-bottom: 20px;
}

button,
select {
    font-size: 20px;
    padding: 12px 24px;
    margin: 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

.guide-text {
    font-size: 24px;
    font-weight: bold;
    margin-top: 25px;
    margin-bottom: 10px;
}

.male {
    background: #6aa9ff;
    color: black;
}

.female {
    background: #ff8fc7;
    color: black;
}

#result {
    font-size: 60px;
    font-weight: bold;
    margin: 30px;
    min-height: 80px;
}

.team-red {
    color: red;
}

.team-blue {
    color: blue;
}

.team-orange {
    color: orange;
}

.team-pink {
    color: deeppink;
}

.team-white {
    color: black;
}

table {
    margin: 20px auto;
    border-collapse: collapse;
    background: white;
    font-size: 20px;
}

th,
td {
    border: 1px solid #ccc;
    padding: 12px 24px;
}

.logo-area {
    margin-top: 30px;
}

.logo-area img {
    width: 180px;
    max-width: 70%;
}
</style>
</head>

<body>

<h1>YOLO ドッジボール チームくじ</h1>

<label>チーム数：</label>

<select id="teamCount" onchange="resetTeams()">
    <option value="2">2チーム</option>
    <option value="3">3チーム</option>
    <option value="4" selected>4チーム</option>
    <option value="5">5チーム</option>
</select>

<p class="guide-text">
    どちらかのボタンを押してください
</p>

<div>
    <button class="male" onclick="draw('male')">
        男子
    </button>

    <button class="female" onclick="draw('female')">
        女子
    </button>
</div>

<div id="result">？</div>

<table>
    <thead>
        <tr>
            <th>チーム</th>
            <th>男子</th>
            <th>女子</th>
        </tr>
    </thead>

    <tbody id="teamTable"></tbody>
</table>

<div class="logo-area">
    <img src="yolo-logo.png" alt="YOLO">
</div>

<script>
const allTeams = [
    "RED",
    "BLUE",
    "ORANGE",
    "PINK",
    "WHITE"
];

let maleIndex = 0;
let femaleIndex = 0;
let counts = {};

function getTeams() {
    const teamCount =
        Number(document.getElementById("teamCount").value);

    return allTeams.slice(0, teamCount);
}

function getTeamClass(team) {
    return "team-" + team.toLowerCase();
}

function resetTeams() {
    const teams = getTeams();

    maleIndex = 0;
    femaleIndex = teams.length - 1;

    counts = {};

    teams.forEach(team => {
        counts[team] = {
            male: 0,
            female: 0
        };
    });

    document.getElementById("result").textContent = "？";
    document.getElementById("result").className = "";

    renderTable();
}

function draw(gender) {
    const teams = getTeams();
    const result = document.getElementById("result");

    let animationCount = 0;

    const animation = setInterval(() => {
        const randomTeam =
            teams[Math.floor(Math.random() * teams.length)];

        result.textContent = randomTeam;
        result.className = getTeamClass(randomTeam);

        animationCount++;

        if (animationCount >= 30) {
            clearInterval(animation);

            let selectedTeam;

            if (gender === "male") {
                selectedTeam = teams[maleIndex];
                maleIndex = (maleIndex + 1) % teams.length;
                counts[selectedTeam].male++;
            } else {
                selectedTeam = teams[femaleIndex];
                femaleIndex =
                    (femaleIndex - 1 + teams.length) % teams.length;
                counts[selectedTeam].female++;
            }

            result.textContent = selectedTeam;
            result.className = getTeamClass(selectedTeam);

            renderTable();
        }
    }, 80);
}

function renderTable() {
    const teams = getTeams();

    const displayOrder = [
        "ORANGE",
        "BLUE",
        "PINK",
        "RED",
        "WHITE"
    ];

    const displayTeams =
        displayOrder.filter(team => teams.includes(team));

    const tbody =
        document.getElementById("teamTable");

    tbody.innerHTML = displayTeams.map(team => `
        <tr>
            <td class="${getTeamClass(team)}">
                <strong>${team}</strong>
            </td>
            <td>${counts[team].male}</td>
            <td>${counts[team].female}</td>
        </tr>
    `).join("");
}

resetTeams();
</script>

</body>
</html>
